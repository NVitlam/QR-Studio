<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
<style>
/* ============================================
   CSS RESET & VARIABLES — DARK THEME (default)
   ============================================ */
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-hover: #1c2129;
  --border: rgba(255,255,255,0.06);
  --border-active: rgba(79,195,247,0.3);
  --text: #e6edf3;
  --text-dim: #7d8590;
  --text-muted: #484f58;
  --accent: #4fc3f7;
  --accent-dim: rgba(79,195,247,0.15);
  --accent-glow: rgba(79,195,247,0.08);
  --danger: #f85149;
  --success: #3fb950;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font-sans: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --checker-dark: #2a2f38;
  --checker-bg: #1a1f27;
  --preview-card-bg: rgba(22,27,34,0.5);
  --scrollbar-thumb: var(--text-muted);
  --btn-primary-text: #0d1117;
}

/* ============================================
   LIGHT THEME
   ============================================ */
[data-theme="light"] {
  --bg: #f6f8fa;
  --surface: #ffffff;
  --surface-hover: #f0f2f5;
  --border: rgba(0,0,0,0.08);
  --border-active: rgba(2,136,209,0.35);
  --text: #1f2328;
  --text-dim: #656d76;
  --text-muted: #8b949e;
  --accent: #0288d1;
  --accent-dim: rgba(2,136,209,0.12);
  --accent-glow: rgba(2,136,209,0.06);
  --danger: #cf222e;
  --success: #1a7f37;
  --checker-dark: #e0e0e0;
  --checker-bg: #f0f0f0;
  --preview-card-bg: rgba(255,255,255,0.7);
  --scrollbar-thumb: #c0c5cc;
  --btn-primary-text: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

/* ============================================
   HEADER
   ============================================ */
.app-header {
  height: 64px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background 0.3s, border-color 0.3s;
}

.app-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.app-brand svg {
  width: 32px;
  height: 32px;
}

.app-title {
  font-size: 1.1em;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.app-subtitle {
  font-family: var(--font-mono);
  font-size: 0.65em;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

/* Theme Toggle */
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: all 0.2s;
  width: 40px;
  height: 40px;
}

.theme-toggle:hover {
  border-color: var(--text-muted);
  color: var(--text);
  background: var(--surface-hover);
}

.theme-toggle svg {
  width: 20px;
  height: 20px;
  transition: transform 0.3s;
}

.theme-toggle:hover svg {
  transform: rotate(15deg);
}

.theme-toggle .icon-sun,
.theme-toggle .icon-moon { display: none; }

[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
[data-theme="light"] .theme-toggle .icon-sun { display: none; }
[data-theme="light"] .theme-toggle .icon-moon { display: block; }

/* ============================================
   LAYOUT
   ============================================ */
.app-layout {
  display: flex;
  min-height: calc(100vh - 64px);
}

.sidebar {
  width: 400px;
  min-width: 400px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  height: calc(100vh - 64px);
  padding: 20px 20px 120px;
  position: sticky;
  top: 64px;
  background: var(--bg);
  transition: background 0.3s, border-color 0.3s;
}

.sidebar::-webkit-scrollbar {
  width: 6px;
}

.sidebar::-webkit-scrollbar-track {
  background: transparent;
}

.sidebar::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 3px;
}

.preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  gap: 28px;
  min-height: calc(100vh - 64px);
  background: var(--bg);
  transition: background 0.3s;
}

.preview-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  background: var(--preview-card-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, border-color 0.3s;
}

.preview-container {
  border-radius: var(--radius-sm);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.preview-container.transparent-mode {
  background-image:
    linear-gradient(45deg, var(--checker-dark) 25%, transparent 25%),
    linear-gradient(-45deg, var(--checker-dark) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, var(--checker-dark) 75%),
    linear-gradient(-45deg, transparent 75%, var(--checker-dark) 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0;
  background-color: var(--checker-bg);
}

.preview-container canvas,
.preview-container svg {
  display: block;
  max-width: 100%;
  height: auto;
}

.export-actions {
  display: flex;
  gap: 12px;
}

/* ============================================
   BUTTONS
   ============================================ */
.btn {
  font-family: var(--font-sans);
  font-size: 0.875em;
  font-weight: 600;
  padding: 11px 24px;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: var(--accent);
  color: var(--btn-primary-text);
}

.btn-primary:hover {
  opacity: 0.88;
}

.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  border-color: var(--text-muted);
  background: var(--surface);
}

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid rgba(248,81,73,0.3);
  font-size: 0.8em;
  padding: 7px 14px;
}

.btn-danger:hover {
  background: rgba(248,81,73,0.1);
}

/* ============================================
   CONTROL SECTIONS
   ============================================ */
.control-section {
  margin-bottom: 4px;
}

.url-section {
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

details.control-section {
  border-bottom: 1px solid var(--border);
}

details.control-section > summary {
  list-style: none;
  cursor: pointer;
  user-select: none;
}

details.control-section > summary::-webkit-details-marker {
  display: none;
}

.section-header {
  font-family: var(--font-mono);
  font-size: 0.7em;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  padding: 14px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0.7;
  transition: opacity 0.15s, color 0.3s;
}

.section-header:hover {
  opacity: 1;
}

.section-header .chevron {
  transition: transform 0.2s ease;
  font-size: 1.2em;
  line-height: 1;
}

details[open] > summary .chevron {
  transform: rotate(90deg);
}

.section-body {
  padding: 4px 0 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ============================================
   CONTROL ROWS
   ============================================ */
.control-label {
  font-size: 0.8em;
  color: var(--text-dim);
  margin-bottom: 6px;
  display: block;
}

.control-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.9em;
  outline: none;
  transition: border-color 0.15s, background 0.3s, color 0.3s;
}

.control-input:focus {
  border-color: var(--border-active);
}

.control-input::placeholder {
  color: var(--text-muted);
}

/* ============================================
   RANGE SLIDERS
   ============================================ */
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.slider-row label {
  font-size: 0.8em;
  color: var(--text-dim);
  min-width: 56px;
}

.slider-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--surface);
  border-radius: 2px;
  outline: none;
}

.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 1px rgba(79,195,247,0.3);
}

.slider-row input[type="range"]::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg);
}

.slider-value {
  font-family: var(--font-mono);
  font-size: 0.75em;
  color: var(--text-dim);
  min-width: 44px;
  text-align: right;
}

/* ============================================
   TOGGLE GROUPS
   ============================================ */
.toggle-group {
  display: flex;
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: background 0.3s, border-color 0.3s;
}

.toggle-group input[type="radio"] {
  display: none;
}

.toggle-group label {
  flex: 1;
  text-align: center;
  padding: 8px 12px;
  font-size: 0.8em;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  border-right: 1px solid var(--border);
}

.toggle-group label:last-of-type {
  border-right: none;
}

.toggle-group input[type="radio"]:checked + label {
  background: var(--accent-dim);
  color: var(--accent);
}

/* ============================================
   COLOR PICKERS
   ============================================ */
.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.color-row label {
  font-size: 0.8em;
  color: var(--text-dim);
  min-width: 56px;
}

.color-input-group {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.color-swatch-wrapper {
  position: relative;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
}

.color-swatch-wrapper input[type="color"] {
  position: absolute;
  top: -4px;
  left: -4px;
  width: 40px;
  height: 40px;
  border: none;
  cursor: pointer;
  opacity: 0;
}

.color-swatch {
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.hex-input {
  width: 80px;
  padding: 6px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.75em;
  outline: none;
  text-transform: uppercase;
  transition: background 0.3s, border-color 0.15s, color 0.3s;
}

.hex-input:focus {
  border-color: var(--border-active);
}

.color-row.disabled {
  opacity: 0.35;
  pointer-events: none;
}

/* ============================================
   STYLE GRID
   ============================================ */
.style-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.style-tile {
  aspect-ratio: 1;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  padding: 10px;
  position: relative;
}

.style-tile:hover {
  border-color: var(--text-muted);
}

.style-tile.active {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.style-tile svg {
  width: 100%;
  height: 100%;
}

.style-tile-label {
  position: absolute;
  bottom: 3px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.55em;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ============================================
   SWITCH TOGGLE
   ============================================ */
.switch-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.switch-row span {
  font-size: 0.8em;
  color: var(--text-dim);
}

.switch {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.switch-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  transition: all 0.2s;
}

.switch-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  top: 2px;
  background: var(--text-dim);
  border-radius: 50%;
  transition: all 0.2s;
}

.switch input:checked + .switch-slider {
  background: var(--accent-dim);
  border-color: var(--accent);
}

.switch input:checked + .switch-slider::before {
  transform: translateX(18px);
  background: var(--accent);
}

/* ============================================
   LOGO UPLOAD
   ============================================ */
.logo-drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
}

.logo-drop-zone:hover {
  border-color: var(--text-muted);
}

.logo-drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.logo-drop-zone p {
  font-size: 0.8em;
  color: var(--text-dim);
}

.logo-drop-zone .upload-icon {
  font-size: 1.5em;
  margin-bottom: 4px;
  color: var(--text-muted);
}

.logo-preview-row {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 10px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.logo-preview-row.visible {
  display: flex;
}

.logo-preview-thumb {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  object-fit: contain;
  background: var(--bg);
}

.logo-preview-info {
  flex: 1;
  font-size: 0.8em;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 900px) {
  .app-layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    min-width: unset;
    height: auto;
    border-right: none;
    border-top: 1px solid var(--border);
    position: static;
    order: 2;
  }

  .preview-area {
    position: sticky;
    top: 64px;
    z-index: 10;
    min-height: auto;
    padding: 24px 16px;
    border-bottom: 1px solid var(--border);
    order: 1;
  }

  .preview-card {
    padding: 20px;
  }
}

/* ============================================
   EMPTY STATE
   ============================================ */
.empty-state {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.9em;
  padding: 40px;
}

/* ============================================
   HEADER TOOLBAR
   ============================================ */
.header-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.toolbar-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: all 0.15s;
  width: 36px;
  height: 36px;
  position: relative;
}

.toolbar-btn:hover {
  border-color: var(--border);
  color: var(--text);
  background: var(--surface-hover);
}

.toolbar-btn:disabled {
  opacity: 0.3;
  cursor: default;
  pointer-events: none;
}

.toolbar-btn svg {
  width: 18px;
  height: 18px;
}

.toolbar-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 4px;
}

.toolbar-btn[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.65em;
  font-family: var(--font-mono);
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
}

/* ============================================
   TOAST NOTIFICATIONS
   ============================================ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 20px;
  font-size: 0.85em;
  color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  animation: toast-in 0.25s ease, toast-out 0.25s ease 1.75s forwards;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast.toast-success { border-left: 3px solid var(--success); }
.toast.toast-error { border-left: 3px solid var(--danger); }
.toast.toast-info { border-left: 3px solid var(--accent); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes toast-out {
  from { opacity: 1; }
  to { opacity: 0; transform: translateY(-8px); }
}

/* ============================================
   MODAL
   ============================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 5000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fade-in 0.15s ease;
  backdrop-filter: blur(4px);
}

.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  max-width: 560px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  animation: modal-in 0.2s ease;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-size: 1.1em;
  font-weight: 600;
}

.modal-close {
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.3em;
  padding: 4px;
  line-height: 1;
  border-radius: 4px;
  transition: color 0.15s;
}

.modal-close:hover {
  color: var(--text);
}

.modal-body {
  font-size: 0.9em;
  color: var(--text-dim);
  line-height: 1.7;
}

@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes modal-in {
  from { opacity: 0; transform: scale(0.95) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* ============================================
   SHORTCUTS TABLE
   ============================================ */
.shortcuts-table {
  width: 100%;
  border-collapse: collapse;
}

.shortcuts-table td {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.shortcuts-table td:first-child {
  color: var(--text);
  font-weight: 500;
}

.shortcuts-table td:last-child {
  text-align: right;
}

.kbd {
  display: inline-block;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 7px;
  font-family: var(--font-mono);
  font-size: 0.8em;
  color: var(--text-dim);
  min-width: 24px;
  text-align: center;
}

/* ============================================
   PREVIEW ANIMATIONS
   ============================================ */
@keyframes qr-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
@keyframes qr-glow { 0%,100% { box-shadow: 0 0 0 rgba(79,195,247,0); } 50% { box-shadow: 0 0 32px rgba(79,195,247,0.25); } }
@keyframes qr-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes qr-rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }

.preview-container.anim-pulse { animation: qr-pulse 2s ease-in-out infinite; }
.preview-container.anim-glow { animation: qr-glow 2.5s ease-in-out infinite; }
.preview-container.anim-float { animation: qr-float 3s ease-in-out infinite; }
.preview-container.anim-rotate { animation: qr-rotate 10s linear infinite; }

/* ============================================
   DATA TYPE TABS
   ============================================ */
.data-type-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.data-type-tab {
  font-family: var(--font-sans);
  font-size: 0.7em;
  font-weight: 500;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.data-type-tab:hover {
  border-color: var(--text-muted);
  color: var(--text);
}

.data-type-tab.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.data-type-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.data-type-form .control-input {
  font-size: 0.85em;
  padding: 8px 12px;
}

.data-type-form .field-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.data-type-form .field-label {
  font-size: 0.75em;
  color: var(--text-dim);
  font-weight: 500;
}

.data-type-form select {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.85em;
  outline: none;
  cursor: pointer;
}

.auto-detect-hint {
  font-size: 0.7em;
  color: var(--accent);
  cursor: pointer;
  padding: 3px 0;
  display: none;
}

.auto-detect-hint:hover {
  text-decoration: underline;
}

/* ============================================
   TEMPLATE GALLERY
   ============================================ */
.template-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 4px 0 8px;
  scrollbar-width: thin;
}

.template-scroll::-webkit-scrollbar {
  height: 4px;
}

.template-scroll::-webkit-scrollbar-thumb {
  background: var(--text-muted);
  border-radius: 2px;
}

.template-card {
  flex-shrink: 0;
  width: 80px;
  cursor: pointer;
  text-align: center;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 4px 6px;
  background: var(--surface);
  transition: all 0.15s;
}

.template-card:hover {
  border-color: var(--text-muted);
  transform: translateY(-2px);
}

.template-card.active {
  border-color: var(--accent);
}

.template-card canvas,
.template-card img {
  width: 56px;
  height: 56px;
  border-radius: 4px;
  display: block;
  margin: 0 auto 4px;
}

.template-card-name {
  font-size: 0.55em;
  font-family: var(--font-mono);
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.template-colors {
  display: flex;
  gap: 2px;
  justify-content: center;
  margin-top: 3px;
}

.template-color-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1px solid var(--border);
}

/* ============================================
   EXPORT DROPDOWN
   ============================================ */
.export-group {
  position: relative;
}

.export-dropdown {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 0;
  margin-bottom: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 6px;
  min-width: 160px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 200;
}

.export-dropdown.visible {
  display: block;
}

.export-dropdown button {
  width: 100%;
  text-align: left;
  padding: 8px 12px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.8em;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.1s;
}

.export-dropdown button:hover {
  background: var(--surface-hover);
}

/* ============================================
   BATCH MODE
   ============================================ */
.batch-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 5000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fade-in 0.15s ease;
}

.batch-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  max-width: 700px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  animation: modal-in 0.2s ease;
}

.batch-textarea {
  width: 100%;
  min-height: 120px;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.8em;
  resize: vertical;
  outline: none;
}

.batch-textarea:focus {
  border-color: var(--border-active);
}

.batch-progress {
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  overflow: hidden;
  margin: 12px 0;
}

.batch-progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.2s;
  width: 0;
}

.batch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.batch-item {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px;
  text-align: center;
  background: var(--bg);
}

.batch-item canvas {
  width: 100%;
  height: auto;
  display: block;
}

.batch-item-label {
  font-size: 0.55em;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ============================================
   READABILITY SCORE
   ============================================ */
.readability-bar {
  margin-top: 8px;
  text-align: center;
}

.readability-track {
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, #f85149, #f7c948, #3fb950);
  position: relative;
  margin-bottom: 6px;
}

.readability-marker {
  position: absolute;
  top: -3px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--text);
  border: 2px solid var(--bg);
  transform: translateX(-50%);
  transition: left 0.3s;
}

.readability-label {
  font-family: var(--font-mono);
  font-size: 0.7em;
  color: var(--text-dim);
}

.readability-score {
  font-weight: 600;
  color: var(--text);
}

/* ============================================
   COLOR HARMONY
   ============================================ */
.harmony-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}

.harmony-pill {
  font-family: var(--font-sans);
  font-size: 0.7em;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.harmony-pill:hover {
  border-color: var(--text-muted);
  color: var(--text);
}

.harmony-swatches {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.harmony-swatch {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}

.harmony-swatch:hover {
  transform: scale(1.15);
  border-color: var(--text-muted);
}

/* ============================================
   ANIMATION TOGGLE
   ============================================ */
.anim-toggle-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 4px;
}

.anim-toggle-btn {
  font-family: var(--font-mono);
  font-size: 0.65em;
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.anim-toggle-btn:hover { border-color: var(--text-muted); color: var(--text); }
.anim-toggle-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

   PRINT

<!-- ============================================

     ============================================ -->
<script>
(function() {
  'use strict';

  // ============================================
  // DEFAULT STATE
  // ============================================
  var DEFAULT_STATE = {
    data: 'https://example.com',
    width: 300,
    height: 300,
    margin: 10,
    qrOptions: { errorCorrectionLevel: 'Q' },
    dotsOptions: { type: 'rounded', color: '#4fc3f7', gradient: null },
    cornersSquareOptions: { type: 'extra-rounded', color: '#4fc3f7' },
    cornersDotOptions: { type: 'dot', color: '#4fc3f7' },
    backgroundOptions: { color: '#0d1117' },
    image: '',
    imageOptions: { hideBackgroundDots: true, imageSize: 0.35, margin: 5, crossOrigin: 'anonymous' }
  };

  var state = deepClone(DEFAULT_STATE);
  var qrCode = null;

  // ============================================
  // UNDO / REDO
  // ============================================
  var undoStack = [];
  var redoStack = [];
  var MAX_UNDO = 50;
  var lastSnapshotTime = 0;

  function pushUndo() {
    var now = Date.now();
    if (now - lastSnapshotTime < 300) return;
    lastSnapshotTime = now;
    undoStack.push(serializeState());
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
    updateUndoButtons();
  }

  function undo() {
    if (undoStack.length === 0) return;
    redoStack.push(serializeState());
    var prev = undoStack.pop();
    deserializeState(prev);
    syncUIFromState();
    forceUpdate();
    updateUndoButtons();
    autoSave();
  }

  function redo() {
    if (redoStack.length === 0) return;
    undoStack.push(serializeState());
    var next = redoStack.pop();
    deserializeState(next);
    syncUIFromState();
    forceUpdate();
    updateUndoButtons();
    autoSave();
  }

  function updateUndoButtons() {
    var btnUndo = document.getElementById('btn-undo');
    var btnRedo = document.getElementById('btn-redo');
    if (btnUndo) btnUndo.disabled = undoStack.length === 0;
    if (btnRedo) btnRedo.disabled = redoStack.length === 0;
  }

  // ============================================
  // DEEP CLONE & SERIALIZE
  // ============================================
  function deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  function serializeState() {
    var s = deepClone(state);
    // Strip large image data for undo stack (keep reference, not megabytes)
    if (s.image && s.image.length > 5000) {
      s._hasImage = true;
      s._imageRef = state.image; // direct reference, not cloned
    }
    return s;
  }

  function deserializeState(s) {
    var img = '';
    if (s._imageRef) {
      img = s._imageRef;
      delete s._imageRef;
      delete s._hasImage;
    } else if (s.image) {
      img = s.image;
    }
    state.data = s.data || '';
    state.width = s.width || 300;
    state.height = s.height || 300;
    state.margin = s.margin != null ? s.margin : 10;
    state.qrOptions = s.qrOptions || { errorCorrectionLevel: 'Q' };
    state.dotsOptions = s.dotsOptions || { type: 'rounded', color: '#4fc3f7', gradient: null };
    state.cornersSquareOptions = s.cornersSquareOptions || { type: 'extra-rounded', color: '#4fc3f7' };
    state.cornersDotOptions = s.cornersDotOptions || { type: 'dot', color: '#4fc3f7' };
    state.backgroundOptions = s.backgroundOptions || { color: '#0d1117' };
    state.image = img;
    state.imageOptions = s.imageOptions || { hideBackgroundDots: true, imageSize: 0.35, margin: 5, crossOrigin: 'anonymous' };
  }

  // ============================================
  // SYNC UI FROM STATE
  // ============================================
  function syncUIFromState() {
    // Data input
    document.getElementById('qr-data').value = state.data;

    // Size
    document.getElementById('qr-size').value = state.width;
    document.getElementById('qr-size-val').textContent = state.width + 'px';

    // Margin
    document.getElementById('qr-margin').value = state.margin;
    document.getElementById('qr-margin-val').textContent = state.margin;

    // Error correction
    var ecVal = state.qrOptions.errorCorrectionLevel || 'Q';
    var ecRadio = document.getElementById('ec-' + ecVal.toLowerCase());
    if (ecRadio) ecRadio.checked = true;

    // Dot style grid
    syncStyleGrid('dot-style-grid', state.dotsOptions.type);

    // Dot color mode
    if (state.dotsOptions.gradient) {
      document.getElementById('dot-gradient').checked = true;
      document.getElementById('dot-solid-controls').style.display = 'none';
      document.getElementById('dot-gradient-controls').style.display = '';
      // Gradient type
      if (state.dotsOptions.gradient.type === 'radial') {
        document.getElementById('grad-radial').checked = true;
        document.getElementById('grad-rotation-row').style.display = 'none';
      } else {
        document.getElementById('grad-linear').checked = true;
        document.getElementById('grad-rotation-row').style.display = '';
      }
      // Gradient rotation
      var rotDeg = Math.round((state.dotsOptions.gradient.rotation || 0) * 180 / Math.PI);
      document.getElementById('grad-rotation').value = rotDeg;
      document.getElementById('grad-rotation-val').innerHTML = rotDeg + '&deg;';
      // Gradient colors
      if (state.dotsOptions.gradient.colorStops && state.dotsOptions.gradient.colorStops.length >= 2) {
        syncColorPicker('grad-color1', 'grad-color1-hex', 'grad-color1-swatch', state.dotsOptions.gradient.colorStops[0].color);
        syncColorPicker('grad-color2', 'grad-color2-hex', 'grad-color2-swatch', state.dotsOptions.gradient.colorStops[1].color);
      }
    } else {
      document.getElementById('dot-solid').checked = true;
      document.getElementById('dot-solid-controls').style.display = '';
      document.getElementById('dot-gradient-controls').style.display = 'none';
      syncColorPicker('dot-color', 'dot-color-hex', 'dot-color-swatch', state.dotsOptions.color || '#4fc3f7');
    }

    // Corner squares
    syncStyleGrid('corner-sq-style-grid', state.cornersSquareOptions.type);
    syncColorPicker('corner-sq-color', 'corner-sq-color-hex', 'corner-sq-color-swatch', state.cornersSquareOptions.color || '#4fc3f7');

    // Corner dots
    syncStyleGrid('corner-dot-style-grid', state.cornersDotOptions.type);
    syncColorPicker('corner-dot-color', 'corner-dot-color-hex', 'corner-dot-color-swatch', state.cornersDotOptions.color || '#4fc3f7');

    // Background
    var bgColor = state.backgroundOptions.color;
    var isTransparent = bgColor === 'transparent';
    document.getElementById('bg-transparent').checked = isTransparent;
    var preview = document.getElementById('qr-preview');
    if (isTransparent) {
      preview.classList.add('transparent-mode');
      document.getElementById('bg-color-row').classList.add('disabled');
    } else {
      preview.classList.remove('transparent-mode');
      document.getElementById('bg-color-row').classList.remove('disabled');
      syncColorPicker('bg-color', 'bg-color-hex', 'bg-color-swatch', bgColor);
    }

    // Logo
    var dropZone = document.getElementById('logo-drop-zone');
    var previewRow = document.getElementById('logo-preview-row');
    if (state.image) {
      document.getElementById('logo-preview-thumb').src = state.image;
      previewRow.classList.add('visible');
      dropZone.style.display = 'none';
    } else {
      previewRow.classList.remove('visible');
      dropZone.style.display = '';
    }
    document.getElementById('logo-size').value = Math.round(state.imageOptions.imageSize * 100);
    document.getElementById('logo-size-val').textContent = state.imageOptions.imageSize.toFixed(2);
    document.getElementById('logo-margin').value = state.imageOptions.margin;
    document.getElementById('logo-margin-val').textContent = state.imageOptions.margin;
    document.getElementById('logo-hide-dots').checked = state.imageOptions.hideBackgroundDots;
  }

  function syncColorPicker(pickerId, hexId, swatchId, color) {
    var picker = document.getElementById(pickerId);
    var hex = document.getElementById(hexId);
    var swatch = document.getElementById(swatchId);
    if (picker) picker.value = color;
    if (hex) hex.value = color.toUpperCase();
    if (swatch) swatch.style.background = color;
  }

  function syncStyleGrid(gridId, activeStyle) {
    var grid = document.getElementById(gridId);
    if (!grid) return;
    grid.querySelectorAll('.style-tile').forEach(function(t) {
      t.classList.toggle('active', t.dataset.style === activeStyle);
    });
  }

  // ============================================
  // HELPERS
  // ============================================
  function debounce(fn, ms) {
    var timer;
    return function() {
      var args = arguments;
      var ctx = this;
      clearTimeout(timer);
      timer = setTimeout(function() { fn.apply(ctx, args); }, ms);
    };
  }

  function isValidHex(val) {
    return /^#[0-9a-fA-F]{6}$/.test(val);
  }

  // ============================================
  // TOAST NOTIFICATIONS
  // ============================================
  function showToast(message, type) {
    type = type || 'info';
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    toast.className = 'toast toast-' + type;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function() {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 2200);
  }

  // ============================================
  // MODAL SYSTEM
  // ============================================
  function openModal(title, bodyHTML) {
    closeModal();
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modal-overlay';
    overlay.innerHTML =
      '<div class="modal-content">' +
        '<div class="modal-header">' +
          '<div class="modal-title">' + title + '</div>' +
          '<button class="modal-close" id="modal-close-btn">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' + bodyHTML + '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeModal();
    });
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  }

  function closeModal() {
    var existing = document.getElementById('modal-overlay');
    if (existing) existing.parentNode.removeChild(existing);
  }

  // ============================================
  // BUILD QR OPTIONS
  // ============================================
  function buildOptions() {
    var opts = {
      width: state.width,
      height: state.height,
      margin: state.margin,
      type: 'canvas',
      data: state.data || 'https://example.com',
      qrOptions: { errorCorrectionLevel: state.qrOptions.errorCorrectionLevel },
      dotsOptions: {},
      cornersSquareOptions: { type: state.cornersSquareOptions.type, color: state.cornersSquareOptions.color },
      cornersDotOptions: { type: state.cornersDotOptions.type, color: state.cornersDotOptions.color },
      backgroundOptions: { color: state.backgroundOptions.color }
    };

    if (state.dotsOptions.gradient) {
      opts.dotsOptions = { type: state.dotsOptions.type, gradient: deepClone(state.dotsOptions.gradient) };
    } else {
      opts.dotsOptions = { type: state.dotsOptions.type, color: state.dotsOptions.color };
    }

    if (state.image) {
      opts.image = state.image;
      opts.imageOptions = {
        hideBackgroundDots: state.imageOptions.hideBackgroundDots,
        imageSize: state.imageOptions.imageSize,
        margin: state.imageOptions.margin,
        crossOrigin: state.imageOptions.crossOrigin
      };
    }

    return opts;
  }

  // ============================================
  // QR CODE RENDERING
  // ============================================
  function initQR() {
    var container = document.getElementById('qr-preview');
    container.innerHTML = '';
    qrCode = new QRCodeStyling(buildOptions());
    qrCode.append(container);
  }

  function forceUpdate() {
    var container = document.getElementById('qr-preview');
    container.innerHTML = '';
    qrCode = new QRCodeStyling(buildOptions());
    qrCode.append(container);
    updateReadability();
  }

  var debouncedUpdate = debounce(function() { forceUpdate(); autoSave(); }, 80);
  var slowUpdate = debounce(function() { forceUpdate(); autoSave(); }, 300);

  // ============================================
  // SAVE / LOAD CONFIG
  // ============================================
  function getExportState() {
    var s = deepClone(state);
    delete s.image; // Don't export large data URLs
    return s;
  }

  function saveConfig() {
    var json = JSON.stringify(getExportState(), null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'qr-studio-config.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Config saved', 'success');
  }

  function loadConfig() {
    document.getElementById('config-file-input').click();
  }

  function handleConfigFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var parsed = JSON.parse(e.target.result);
        pushUndo();
        deserializeState(parsed);
        syncUIFromState();
        forceUpdate();
        autoSave();
        showToast('Config loaded', 'success');
      } catch (err) {
        showToast('Invalid config file', 'error');
      }
    };
    reader.readAsText(file);
  }

  // ============================================
  // AUTO-SAVE / RESTORE
  // ============================================
  var autoSave = debounce(function() {
    try {
      var s = getExportState();
      localStorage.setItem('qr-studio-autosave', JSON.stringify(s));
    } catch (e) { /* quota exceeded, ignore */ }
  }, 1000);

  function tryRestore() {
    try {
      var saved = localStorage.getItem('qr-studio-autosave');
      if (saved) {
        var parsed = JSON.parse(saved);
        deserializeState(parsed);
        syncUIFromState();
        forceUpdate();
        showToast('Session restored', 'info');
        return true;
      }
    } catch (e) { /* corrupt data, ignore */ }
    return false;
  }

  // ============================================
  // COPY TO CLIPBOARD
  // ============================================
  function copyToClipboard() {
    var canvas = document.querySelector('#qr-preview canvas');
    if (!canvas) { showToast('No QR to copy', 'error'); return; }
    canvas.toBlob(function(blob) {
      if (!blob) { showToast('Copy failed', 'error'); return; }
      if (navigator.clipboard && navigator.clipboard.write) {
        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(function() {
          showToast('Copied to clipboard', 'success');
        }).catch(function() {
          showToast('Copy failed — try downloading', 'error');
        });
      } else {
        showToast('Clipboard not supported in this browser', 'error');
      }
    }, 'image/png');
  }

  // ============================================
  // KEYBOARD SHORTCUTS
  // ============================================
  function showShortcutsModal() {
    openModal('Keyboard Shortcuts',
      '<table class="shortcuts-table">' +
      '<tr><td>Undo</td><td><span class="kbd">Ctrl</span> + <span class="kbd">Z</span></td></tr>' +
      '<tr><td>Redo</td><td><span class="kbd">Ctrl</span> + <span class="kbd">Y</span></td></tr>' +
      '<tr><td>Save Config</td><td><span class="kbd">Ctrl</span> + <span class="kbd">S</span></td></tr>' +
      '<tr><td>Copy PNG</td><td><span class="kbd">Ctrl</span> + <span class="kbd">Shift</span> + <span class="kbd">C</span></td></tr>' +
      '<tr><td>Export PNG</td><td><span class="kbd">Ctrl</span> + <span class="kbd">E</span></td></tr>' +
      '<tr><td>Export SVG</td><td><span class="kbd">Ctrl</span> + <span class="kbd">Shift</span> + <span class="kbd">E</span></td></tr>' +
      '<tr><td>Shortcuts</td><td><span class="kbd">?</span></td></tr>' +
      '</table>'
    );
  }

  function handleKeyboard(e) {
    // Don't capture when typing in inputs
    var tag = e.target.tagName;
    var isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); return; }
    if (e.ctrlKey && e.shiftKey && e.key === 'Z') { e.preventDefault(); redo(); return; }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveConfig(); return; }
    if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) { e.preventDefault(); copyToClipboard(); return; }
    if (e.ctrlKey && e.shiftKey && (e.key === 'E' || e.key === 'e')) {
      e.preventDefault();
      document.getElementById('download-svg').click();
      return;
    }
    if (e.ctrlKey && e.key === 'e') { e.preventDefault(); document.getElementById('download-png').click(); return; }

    if (!isInput && e.key === '?') { showShortcutsModal(); return; }
    if (e.key === 'Escape') { closeModal(); return; }
  }

  // ============================================
  // THEME TOGGLE
  // ============================================
  function initTheme() {
    var saved = localStorage.getItem('qr-studio-theme');
    var theme = saved || 'dark';
    document.body.setAttribute('data-theme', theme);

    document.getElementById('theme-toggle').addEventListener('click', function() {
      var current = document.body.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', next);
      localStorage.setItem('qr-studio-theme', next);
    });
  }

  // ============================================
  // COLOR SYNC HELPER
  // ============================================
  function bindColorPicker(pickerId, hexId, swatchId, onChange) {
    var picker = document.getElementById(pickerId);
    var hex = document.getElementById(hexId);
    var swatch = document.getElementById(swatchId);

    picker.addEventListener('input', function() {
      var val = picker.value;
      hex.value = val.toUpperCase();
      swatch.style.background = val;
      onChange(val);
    });

    // Push undo on committed color change
    picker.addEventListener('change', function() { pushUndo(); });

    hex.addEventListener('change', function() {
      var val = hex.value.trim();
      if (!val.startsWith('#')) val = '#' + val;
      if (isValidHex(val)) {
        pushUndo();
        picker.value = val;
        hex.value = val.toUpperCase();
        swatch.style.background = val;
        onChange(val);
      } else {
        hex.value = picker.value.toUpperCase();
      }
    });
  }

  // ============================================
  // STYLE GRID HELPER
  // ============================================
  function bindStyleGrid(gridId, onSelect) {
    var grid = document.getElementById(gridId);
    grid.addEventListener('click', function(e) {
      var tile = e.target.closest('.style-tile');
      if (!tile) return;
      pushUndo();
      grid.querySelectorAll('.style-tile').forEach(function(t) { t.classList.remove('active'); });
      tile.classList.add('active');
      onSelect(tile.dataset.style);
    });
  }

  // ============================================
  // BIND ALL CONTROLS
  // ============================================
  function bindControls() {
    // --- URL ---
    var dataInput = document.getElementById('qr-data');
    dataInput.addEventListener('input', function() {
      state.data = dataInput.value;
      slowUpdate();
    });
    dataInput.addEventListener('change', function() { pushUndo(); });

    // --- Size ---
    var sizeSlider = document.getElementById('qr-size');
    var sizeVal = document.getElementById('qr-size-val');
    sizeSlider.addEventListener('input', function() {
      var v = parseInt(sizeSlider.value);
      state.width = v;
      state.height = v;
      sizeVal.textContent = v + 'px';
      debouncedUpdate();
    });
    sizeSlider.addEventListener('change', function() { pushUndo(); });

    // --- Margin ---
    var marginSlider = document.getElementById('qr-margin');
    var marginVal = document.getElementById('qr-margin-val');
    marginSlider.addEventListener('input', function() {
      state.margin = parseInt(marginSlider.value);
      marginVal.textContent = marginSlider.value;
      debouncedUpdate();
    });
    marginSlider.addEventListener('change', function() { pushUndo(); });

    // --- Error Correction ---
    document.querySelectorAll('input[name="ec"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        pushUndo();
        state.qrOptions.errorCorrectionLevel = radio.value;
        forceUpdate();
        autoSave();
      });
    });

    // --- Dot Style Grid ---
    bindStyleGrid('dot-style-grid', function(style) {
      state.dotsOptions.type = style;
      forceUpdate();
      autoSave();
    });

    // --- Dot Color Mode ---
    document.querySelectorAll('input[name="dot-color-mode"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        pushUndo();
        if (radio.value === 'solid') {
          state.dotsOptions.gradient = null;
          state.dotsOptions.color = document.getElementById('dot-color').value;
          document.getElementById('dot-solid-controls').style.display = '';
          document.getElementById('dot-gradient-controls').style.display = 'none';
        } else {
          state.dotsOptions.gradient = {
            type: document.getElementById('grad-linear').checked ? 'linear' : 'radial',
            rotation: (parseInt(document.getElementById('grad-rotation').value) * Math.PI) / 180,
            colorStops: [
              { offset: 0, color: document.getElementById('grad-color1').value },
              { offset: 1, color: document.getElementById('grad-color2').value }
            ]
          };
          delete state.dotsOptions.color;
          document.getElementById('dot-solid-controls').style.display = 'none';
          document.getElementById('dot-gradient-controls').style.display = '';
        }
        forceUpdate();
        autoSave();
      });
    });

    // --- Dot Solid Color ---
    bindColorPicker('dot-color', 'dot-color-hex', 'dot-color-swatch', function(val) {
      if (!state.dotsOptions.gradient) state.dotsOptions.color = val;
      debouncedUpdate();
    });

    // --- Gradient Type ---
    document.querySelectorAll('input[name="grad-type"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        pushUndo();
        if (state.dotsOptions.gradient) {
          state.dotsOptions.gradient.type = radio.value;
          document.getElementById('grad-rotation-row').style.display = radio.value === 'radial' ? 'none' : '';
        }
        forceUpdate();
        autoSave();
      });
    });

    // --- Gradient Rotation ---
    var gradRotation = document.getElementById('grad-rotation');
    var gradRotationVal = document.getElementById('grad-rotation-val');
    gradRotation.addEventListener('input', function() {
      var deg = parseInt(gradRotation.value);
      gradRotationVal.innerHTML = deg + '&deg;';
      if (state.dotsOptions.gradient) state.dotsOptions.gradient.rotation = (deg * Math.PI) / 180;
      debouncedUpdate();
    });
    gradRotation.addEventListener('change', function() { pushUndo(); });

    // --- Gradient Colors ---
    bindColorPicker('grad-color1', 'grad-color1-hex', 'grad-color1-swatch', function(val) {
      if (state.dotsOptions.gradient) state.dotsOptions.gradient.colorStops[0].color = val;
      debouncedUpdate();
    });
    bindColorPicker('grad-color2', 'grad-color2-hex', 'grad-color2-swatch', function(val) {
      if (state.dotsOptions.gradient) state.dotsOptions.gradient.colorStops[1].color = val;
      debouncedUpdate();
    });

    // --- Corner Squares ---
    bindStyleGrid('corner-sq-style-grid', function(style) {
      state.cornersSquareOptions.type = style;
      forceUpdate();
      autoSave();
    });
    bindColorPicker('corner-sq-color', 'corner-sq-color-hex', 'corner-sq-color-swatch', function(val) {
      state.cornersSquareOptions.color = val;
      debouncedUpdate();
    });

    // --- Corner Dots ---
    bindStyleGrid('corner-dot-style-grid', function(style) {
      state.cornersDotOptions.type = style;
      forceUpdate();
      autoSave();
    });
    bindColorPicker('corner-dot-color', 'corner-dot-color-hex', 'corner-dot-color-swatch', function(val) {
      state.cornersDotOptions.color = val;
      debouncedUpdate();
    });

    // --- Background Transparent ---
    var bgTransparent = document.getElementById('bg-transparent');
    bgTransparent.addEventListener('change', function() {
      pushUndo();
      var preview = document.getElementById('qr-preview');
      if (bgTransparent.checked) {
        state.backgroundOptions.color = 'transparent';
        preview.classList.add('transparent-mode');
        document.getElementById('bg-color-row').classList.add('disabled');
      } else {
        var c = document.getElementById('bg-color').value;
        state.backgroundOptions.color = c;
        preview.classList.remove('transparent-mode');
        document.getElementById('bg-color-row').classList.remove('disabled');
      }
      forceUpdate();
      autoSave();
    });

    // --- Background Color ---
    bindColorPicker('bg-color', 'bg-color-hex', 'bg-color-swatch', function(val) {
      if (!bgTransparent.checked) state.backgroundOptions.color = val;
      debouncedUpdate();
    });

    // --- Logo Upload ---
    var dropZone = document.getElementById('logo-drop-zone');
    var fileInput = document.getElementById('logo-upload-input');
    var previewRow = document.getElementById('logo-preview-row');
    var previewThumb = document.getElementById('logo-preview-thumb');
    var previewInfo = document.getElementById('logo-preview-info');

    function handleLogoFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        pushUndo();
        state.image = e.target.result;
        previewThumb.src = e.target.result;
        previewInfo.textContent = file.name;
        previewRow.classList.add('visible');
        dropZone.style.display = 'none';
        forceUpdate();
        autoSave();
      };
      reader.readAsDataURL(file);
    }

    dropZone.addEventListener('click', function() { fileInput.click(); });
    dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('drag-over'); handleLogoFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', function() { handleLogoFile(fileInput.files[0]); });

    document.getElementById('remove-logo').addEventListener('click', function() {
      pushUndo();
      state.image = '';
      fileInput.value = '';
      previewRow.classList.remove('visible');
      dropZone.style.display = '';
      forceUpdate();
      autoSave();
    });

    // --- Logo Size ---
    var logoSize = document.getElementById('logo-size');
    var logoSizeVal = document.getElementById('logo-size-val');
    logoSize.addEventListener('input', function() {
      var v = parseInt(logoSize.value) / 100;
      state.imageOptions.imageSize = v;
      logoSizeVal.textContent = v.toFixed(2);
      debouncedUpdate();
    });
    logoSize.addEventListener('change', function() { pushUndo(); });

    // --- Logo Margin ---
    var logoMargin = document.getElementById('logo-margin');
    var logoMarginVal = document.getElementById('logo-margin-val');
    logoMargin.addEventListener('input', function() {
      state.imageOptions.margin = parseInt(logoMargin.value);
      logoMarginVal.textContent = logoMargin.value;
      debouncedUpdate();
    });
    logoMargin.addEventListener('change', function() { pushUndo(); });

    // --- Logo Hide Dots ---
    document.getElementById('logo-hide-dots').addEventListener('change', function() {
      pushUndo();
      state.imageOptions.hideBackgroundDots = this.checked;
      forceUpdate();
      autoSave();
    });

    // --- Copy PNG ---
    document.getElementById('copy-png').addEventListener('click', copyToClipboard);

    // --- Header Toolbar ---
    document.getElementById('btn-undo').addEventListener('click', undo);
    document.getElementById('btn-redo').addEventListener('click', redo);
    document.getElementById('btn-save').addEventListener('click', saveConfig);
    document.getElementById('btn-load').addEventListener('click', loadConfig);
    document.getElementById('btn-shortcuts').addEventListener('click', showShortcutsModal);
    document.getElementById('btn-scanner').addEventListener('click', openScanner);
    document.getElementById('config-file-input').addEventListener('change', function() {
      handleConfigFile(this.files[0]);
      this.value = '';
    });

    // --- Keyboard Shortcuts ---
    document.addEventListener('keydown', handleKeyboard);

    // --- Data Type Tabs ---
    bindDataTypes();

    // --- Templates ---
    initTemplates();

    // --- Export Dropdown ---
    bindExportDropdown();

    // --- Batch Mode ---
    document.getElementById('btn-batch').addEventListener('click', openBatchMode);

    // --- Animation Toggle ---
    bindAnimToggle();

    // --- Color Harmony ---
    bindColorHarmony();

    // --- Readability ---
    updateReadability();
  }

  // ============================================
  // DATA TYPE SYSTEM
  // ============================================
  var currentDataType = 'url';
  var dataFields = {};

  var DATA_TYPES = {
    url: {
      fields: [{ id: 'url', label: 'URL', placeholder: 'https://example.com', type: 'text' }],
      format: function(f) { return f.url || ''; }
    },
    text: {
      fields: [{ id: 'text', label: 'Text', placeholder: 'Enter any text...', type: 'textarea' }],
      format: function(f) { return f.text || ''; }
    },
    wifi: {
      fields: [
        { id: 'ssid', label: 'Network Name (SSID)', placeholder: 'MyWiFi', type: 'text' },
        { id: 'password', label: 'Password', placeholder: 'password123', type: 'text' },
        { id: 'encryption', label: 'Encryption', type: 'select', options: ['WPA', 'WEP', 'nopass'] }
      ],
      format: function(f) {
        var enc = f.encryption || 'WPA';
        return 'WIFI:T:' + enc + ';S:' + (f.ssid || '') + ';P:' + (f.password || '') + ';;';
      }
    },
    vcard: {
      fields: [
        { id: 'firstName', label: 'First Name', placeholder: 'John', type: 'text' },
        { id: 'lastName', label: 'Last Name', placeholder: 'Doe', type: 'text' },
        { id: 'phone', label: 'Phone', placeholder: '+1234567890', type: 'text' },
        { id: 'email', label: 'Email', placeholder: 'john@example.com', type: 'text' },
        { id: 'org', label: 'Organization', placeholder: 'Company', type: 'text' },
        { id: 'url', label: 'Website', placeholder: 'https://example.com', type: 'text' }
      ],
      format: function(f) {
        return 'BEGIN:VCARD\nVERSION:3.0\nN:' + (f.lastName || '') + ';' + (f.firstName || '') +
          '\nFN:' + (f.firstName || '') + ' ' + (f.lastName || '') +
          (f.phone ? '\nTEL:' + f.phone : '') +
          (f.email ? '\nEMAIL:' + f.email : '') +
          (f.org ? '\nORG:' + f.org : '') +
          (f.url ? '\nURL:' + f.url : '') +
          '\nEND:VCARD';
      }
    },
    email: {
      fields: [
        { id: 'to', label: 'To', placeholder: 'recipient@example.com', type: 'text' },
        { id: 'subject', label: 'Subject', placeholder: 'Hello', type: 'text' },
        { id: 'body', label: 'Message', placeholder: 'Your message...', type: 'textarea' }
      ],
      format: function(f) {
        var parts = [];
        if (f.subject) parts.push('subject=' + encodeURIComponent(f.subject));
        if (f.body) parts.push('body=' + encodeURIComponent(f.body));
        return 'mailto:' + (f.to || '') + (parts.length ? '?' + parts.join('&') : '');
      }
    },
    sms: {
      fields: [
        { id: 'phone', label: 'Phone Number', placeholder: '+1234567890', type: 'text' },
        { id: 'message', label: 'Message', placeholder: 'Hello!', type: 'textarea' }
      ],
      format: function(f) { return 'smsto:' + (f.phone || '') + ':' + (f.message || ''); }
    },
    phone: {
      fields: [{ id: 'phone', label: 'Phone Number', placeholder: '+1234567890', type: 'text' }],
      format: function(f) { return 'tel:' + (f.phone || ''); }
    },
    geo: {
      fields: [
        { id: 'lat', label: 'Latitude', placeholder: '40.7128', type: 'text' },
        { id: 'lon', label: 'Longitude', placeholder: '-74.0060', type: 'text' }
      ],
      format: function(f) { return 'geo:' + (f.lat || '0') + ',' + (f.lon || '0'); }
    }
  };

  function renderDataTypeForm(type) {
    var config = DATA_TYPES[type];
    if (!config) return;
    currentDataType = type;
    dataFields = {};

    // Update active tab
    document.querySelectorAll('.data-type-tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.type === type);
    });

    var container = document.getElementById('data-type-form-container');
    var html = '<div class="data-type-form">';
    config.fields.forEach(function(field) {

  function exportAsFormat(mimeType, filename) {
    var canvas = document.querySelector('#qr-preview canvas');
    if (!canvas) return;
    // For JPEG, composite on white background
    if (mimeType === 'image/jpeg') {
      var c = document.createElement('canvas');
      c.width = canvas.width; c.height = canvas.height;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.drawImage(canvas, 0, 0);
      c.toBlob(function(blob) { downloadBlob(blob, filename); }, mimeType, 0.92);
    } else {
      canvas.toBlob(function(blob) { downloadBlob(blob, filename); }, mimeType, 0.92);
    }
  }

  function downloadBlob(blob, filename) {
    if (!blob) { showToast('Export failed', 'error'); return; }
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  function closeBatchMode() {
    var el = document.getElementById('batch-overlay');
    if (el) el.parentNode.removeChild(el);
  }

  var batchBlobs = [];

  function runBatch() {
    var text = document.getElementById('batch-urls').value.trim();
    var urls = text.split('\n').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
    if (urls.length === 0) { showToast('Enter at least one URL', 'error'); return; }
    if (urls.length > 500) { showToast('Max 500 items', 'error'); return; }

    var grid = document.getElementById('batch-grid');
    grid.innerHTML = '';
    batchBlobs = [];

    var progress = document.getElementById('batch-progress');
    var progressBar = document.getElementById('batch-progress-bar');
    progress.style.display = '';
    document.getElementById('batch-download-all').style.display = 'none';

    var idx = 0;
    function processNext() {
      if (idx >= urls.length) {
        document.getElementById('batch-download-all').style.display = '';
        showToast('Generated ' + urls.length + ' QR codes', 'success');
        return;
      }
      var url = urls[idx];
      progressBar.style.width = ((idx + 1) / urls.length * 100) + '%';

      var opts = buildOptions();
      opts.data = url;
      opts.width = 200;
      opts.height = 200;

      var item = document.createElement('div');
      item.className = 'batch-item';
      var container = document.createElement('div');
      item.appendChild(container);
      var label = document.createElement('div');
      label.className = 'batch-item-label';
      label.textContent = url.replace(/^https?:\/\//, '').substring(0, 25);
      item.appendChild(label);
      grid.appendChild(item);

      var qr = new QRCodeStyling(opts);
      qr.append(container);

      // Extract blob after render
      setTimeout(function() {
        var c = container.querySelector('canvas');
        if (c) {
          c.toBlob(function(blob) {
            batchBlobs.push({ name: 'qr-' + (idx + 1) + '.png', blob: blob });
            idx++;
            processNext();
          }, 'image/png');
        } else {
          idx++;
          processNext();
        }
      }, 100);
    }
    processNext();
  }

  function downloadBatchZip() {
    if (batchBlobs.length === 0) return;
    // Simple sequential download fallback (no JSZip dependency)
    batchBlobs.forEach(function(item, i) {
      setTimeout(function() {
        downloadBlob(item.blob, item.name);
      }, i * 200);
    });
    showToast('Downloading ' + batchBlobs.length + ' files', 'info');
  }
