  // ============================================
  // READABILITY SCORE
  // ============================================
  function hexToRGB(hex) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    return { r: parseInt(hex.substring(0,2), 16), g: parseInt(hex.substring(2,4), 16), b: parseInt(hex.substring(4,6), 16) };
  }

  function relativeLuminance(rgb) {
    var rs = rgb.r / 255, gs = rgb.g / 255, bs = rgb.b / 255;
    var r = rs <= 0.03928 ? rs / 12.92 : Math.pow((rs + 0.055) / 1.055, 2.4);
    var g = gs <= 0.03928 ? gs / 12.92 : Math.pow((gs + 0.055) / 1.055, 2.4);
    var b = bs <= 0.03928 ? bs / 12.92 : Math.pow((bs + 0.055) / 1.055, 2.4);
    return 0.2126 * r + 0.7152 * g + 0.0722 * b;
  }

  function contrastRatio(hex1, hex2) {
    var l1 = relativeLuminance(hexToRGB(hex1));
    var l2 = relativeLuminance(hexToRGB(hex2));
    var lighter = Math.max(l1, l2), darker = Math.min(l1, l2);
    return (lighter + 0.05) / (darker + 0.05);
  }

  function updateReadability() {
    var marker = document.getElementById('readability-marker');
    var label = document.getElementById('readability-score');
    if (!marker || !label) return;

    var dotColor = state.dotsOptions.color || '#000000';
    if (state.dotsOptions.gradient && state.dotsOptions.gradient.colorStops) {
      dotColor = state.dotsOptions.gradient.colorStops[0].color;
    }
    var bgColor = state.backgroundOptions.color;
    if (bgColor === 'transparent') bgColor = '#ffffff';

    // Contrast score (40%)
    var cr = contrastRatio(dotColor, bgColor);
    var contrastScore = cr >= 7 ? 100 : cr >= 4.5 ? 75 : cr >= 3 ? 45 : 15;

    // Logo coverage score (20%)
    var logoScore = 100;
    if (state.image) {
      var coverage = state.imageOptions.imageSize * 100;
      logoScore = coverage > 40 ? 10 : coverage > 30 ? 40 : coverage > 20 ? 70 : 100;
    }

    // Error correction score (25%)
    var ecMap = { L: 40, M: 60, Q: 80, H: 100 };
    var ecScore = ecMap[state.qrOptions.errorCorrectionLevel] || 80;

    // Data density score (15%)
    var dataLen = (state.data || '').length;
    var densityScore = dataLen > 500 ? 20 : dataLen > 200 ? 50 : dataLen > 100 ? 70 : 100;

    var total = Math.round(contrastScore * 0.4 + logoScore * 0.2 + ecScore * 0.25 + densityScore * 0.15);
    total = Math.max(0, Math.min(100, total));

    marker.style.left = total + '%';
    if (total >= 75) {
      label.textContent = total + ' — Excellent';
      label.style.color = 'var(--success)';
    } else if (total >= 50) {
      label.textContent = total + ' — Good';
      label.style.color = 'var(--accent)';
    } else if (total >= 30) {
      label.textContent = total + ' — Warning';
      label.style.color = '#f7c948';
    } else {
      label.textContent = total + ' — Poor';
      label.style.color = 'var(--danger)';
    }
  }

  // ============================================
  // COLOR HARMONY ENGINE
  // ============================================
  function hexToHSL(hex) {
    var rgb = hexToRGB(hex);
    var r = rgb.r / 255, g = rgb.g / 255, b = rgb.b / 255;
    var max = Math.max(r, g, b), min = Math.min(r, g, b);
    var h = 0, s = 0, l = (max + min) / 2;
    if (max !== min) {
      var d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r) / d + 2) / 6;
      else h = ((r - g) / d + 4) / 6;
    }
    return { h: h * 360, s: s * 100, l: l * 100 };
  }

  function hslToHex(h, s, l) {
    h = ((h % 360) + 360) % 360;
    s = Math.max(0, Math.min(100, s)) / 100;
    l = Math.max(0, Math.min(100, l)) / 100;
    var c = (1 - Math.abs(2 * l - 1)) * s;
    var x = c * (1 - Math.abs((h / 60) % 2 - 1));
    var m = l - c / 2;
    var r = 0, g = 0, b = 0;
    if (h < 60) { r = c; g = x; }
    else if (h < 120) { r = x; g = c; }
    else if (h < 180) { g = c; b = x; }
    else if (h < 240) { g = x; b = c; }
    else if (h < 300) { r = x; b = c; }
    else { r = c; b = x; }
    var toHex = function(v) { var h = Math.round((v + m) * 255).toString(16); return h.length < 2 ? '0' + h : h; };
    return '#' + toHex(r) + toHex(g) + toHex(b);
  }

  function generateHarmony(type) {
    var dotColor = state.dotsOptions.color || '#4fc3f7';
    if (state.dotsOptions.gradient && state.dotsOptions.gradient.colorStops) {
      dotColor = state.dotsOptions.gradient.colorStops[0].color;
    }
    var hsl = hexToHSL(dotColor);
    var colors = [];

    if (type === 'complementary') {
      colors = [
        hslToHex(hsl.h, hsl.s, hsl.l),
        hslToHex(hsl.h + 180, hsl.s, hsl.l),
        hslToHex(hsl.h, hsl.s * 0.6, 92),
        hslToHex(hsl.h + 180, hsl.s * 0.6, 12)
      ];
    } else if (type === 'analogous') {
      colors = [
        hslToHex(hsl.h - 30, hsl.s, hsl.l),
        hslToHex(hsl.h, hsl.s, hsl.l),
        hslToHex(hsl.h + 30, hsl.s, hsl.l),
        hslToHex(hsl.h, hsl.s * 0.3, 93)
      ];
    } else if (type === 'triadic') {
      colors = [
        hslToHex(hsl.h, hsl.s, hsl.l),
        hslToHex(hsl.h + 120, hsl.s, hsl.l),
        hslToHex(hsl.h + 240, hsl.s, hsl.l),
        hslToHex(hsl.h, hsl.s * 0.2, 10)
      ];
    } else if (type === 'split') {
      colors = [
        hslToHex(hsl.h, hsl.s, hsl.l),
        hslToHex(hsl.h + 150, hsl.s, hsl.l),
        hslToHex(hsl.h + 210, hsl.s, hsl.l),
        hslToHex(hsl.h, hsl.s * 0.15, 95)
      ];
    } else { // random
      var rh = Math.random() * 360;
      var rs = 60 + Math.random() * 25;
      var rl = 48 + Math.random() * 15;
      colors = [
        hslToHex(rh, rs, rl),
        hslToHex(rh + 40, rs * 0.8, rl + 10),
        hslToHex(rh + 180, rs * 0.7, rl),
        hslToHex(rh, 8, Math.random() > 0.5 ? 95 : 8)
      ];
    }
    return colors;
  }

  function bindColorHarmony() {
    document.getElementById('harmony-pills').addEventListener('click', function(e) {
      var pill = e.target.closest('.harmony-pill');
      if (!pill) return;
      var colors = generateHarmony(pill.dataset.harmony);
      renderHarmonySwatches(colors);
    });
  }

  function renderHarmonySwatches(colors) {
    var container = document.getElementById('harmony-swatches');
    container.innerHTML = '';
    var labels = ['Dots', 'Corners', 'Corner Dots', 'Background'];
    colors.forEach(function(color, i) {
      var swatch = document.createElement('div');
      swatch.className = 'harmony-swatch';
      swatch.style.background = color;
      swatch.title = labels[i] + ': ' + color;
      container.appendChild(swatch);
    });
    // Add apply button
    var applyBtn = document.createElement('button');
    applyBtn.className = 'btn btn-primary';
    applyBtn.style.cssText = 'font-size:0.7em;padding:6px 14px;margin-left:4px';
    applyBtn.textContent = 'Apply';
    applyBtn.addEventListener('click', function() {
      pushUndo();
      state.dotsOptions.gradient = null;
      state.dotsOptions.color = colors[0];
      state.cornersSquareOptions.color = colors[1];
      state.cornersDotOptions.color = colors[2];
      state.backgroundOptions.color = colors[3];
      syncUIFromState();
      forceUpdate();
      autoSave();
      showToast('Palette applied', 'success');
    });
    container.appendChild(applyBtn);
  }

  function applyTemplate(idx) {
    var tmpl = TEMPLATES[idx];
    if (!tmpl) return;
    pushUndo();

    // Apply template config while preserving data, size, margin, image
    var savedData = state.data;
    var savedWidth = state.width;
    var savedHeight = state.height;
    var savedMargin = state.margin;
    var savedImage = state.image;
    var savedImageOptions = deepClone(state.imageOptions);

    state.dotsOptions = deepClone(tmpl.config.dotsOptions);
    state.cornersSquareOptions = deepClone(tmpl.config.cornersSquareOptions);
    state.cornersDotOptions = deepClone(tmpl.config.cornersDotOptions);
    state.backgroundOptions = deepClone(tmpl.config.backgroundOptions);

    state.data = savedData;
    state.width = savedWidth;
    state.height = savedHeight;
    state.margin = savedMargin;
    state.image = savedImage;
    state.imageOptions = savedImageOptions;

    syncUIFromState();
    forceUpdate();
    autoSave();
    showToast('Applied: ' + tmpl.name, 'success');
  }

  // ============================================
  // QR SCANNER
  // ============================================
  var scannerStream = null;
  var scannerInterval = null;

  function openScanner() {
    var html =
      '<div class="scanner-tabs">' +
        '<button class="scanner-tab active" data-tab="camera">Camera</button>' +
        '<button class="scanner-tab" data-tab="upload">Upload Image</button>' +
      '</div>' +
      '<div id="scanner-camera-panel">' +
        '<div class="scanner-video-wrap"><video id="scanner-video" autoplay playsinline muted></video><div class="scanner-viewfinder"></div></div>' +
        '<div class="scanner-result" id="scanner-result" style="display:none"></div>' +
      '</div>' +
      '<div id="scanner-upload-panel" style="display:none">' +
        '<div class="logo-drop-zone" id="scanner-drop" style="margin-bottom:12px"><div class="upload-icon">&#8682;</div><p>Click or drop a QR image</p><input type="file" id="scanner-file" accept="image/*" style="display:none"></div>' +
        '<canvas id="scanner-canvas" style="display:none"></canvas>' +
        '<div class="scanner-result" id="scanner-upload-result" style="display:none"></div>' +
      '</div>';

    openModal('QR Scanner', html);

    // Tab switching
    document.querySelectorAll('.scanner-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.scanner-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        var isCamera = tab.dataset.tab === 'camera';
        document.getElementById('scanner-camera-panel').style.display = isCamera ? '' : 'none';
        document.getElementById('scanner-upload-panel').style.display = isCamera ? 'none' : '';
        if (isCamera) startCameraScanner();
        else stopCameraScanner();
      });
    });

    // Upload tab
    var dropZone = document.getElementById('scanner-drop');
    var fileInput = document.getElementById('scanner-file');
    dropZone.addEventListener('click', function() { fileInput.click(); });
    dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('drag-over'); scanImageFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', function() { scanImageFile(fileInput.files[0]); });

    // Override modal close to stop camera
    var origClose = closeModal;
    closeModal = function() {
      stopCameraScanner();
      origClose();
      closeModal = origClose;
    };

    // Start camera
    startCameraScanner();
  }

  function startCameraScanner() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      document.getElementById('scanner-result').style.display = 'block';
      document.getElementById('scanner-result').textContent = 'Camera not available in this browser';
      return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(function(stream) {
      scannerStream = stream;
      var video = document.getElementById('scanner-video');
      if (!video) return;
      video.srcObject = stream;

      // Use BarcodeDetector if available, else show message
      if (window.BarcodeDetector) {
        var detector = new BarcodeDetector({ formats: ['qr_code'] });
        scannerInterval = setInterval(function() {
          if (video.readyState < 2) return;
          detector.detect(video).then(function(barcodes) {
            if (barcodes.length > 0) {
              showScanResult(barcodes[0].rawValue, 'scanner-result');
            }
          }).catch(function() {});
        }, 300);
      } else {
        document.getElementById('scanner-result').style.display = 'block';
        document.getElementById('scanner-result').innerHTML = 'BarcodeDetector not available. Try the <b>Upload</b> tab to scan an image, or use Chrome for camera scanning.';
      }
    }).catch(function(err) {
      document.getElementById('scanner-result').style.display = 'block';
      document.getElementById('scanner-result').textContent = 'Camera access denied: ' + err.message;
    });
  }

  function stopCameraScanner() {
    if (scannerInterval) { clearInterval(scannerInterval); scannerInterval = null; }
    if (scannerStream) { scannerStream.getTracks().forEach(function(t) { t.stop(); }); scannerStream = null; }
  }

  function scanImageFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    var img = new Image();
    var reader = new FileReader();
    reader.onload = function(e) {
      img.onload = function() {
        var canvas = document.getElementById('scanner-canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        if (window.BarcodeDetector) {
          var detector = new BarcodeDetector({ formats: ['qr_code'] });
          detector.detect(canvas).then(function(barcodes) {
            if (barcodes.length > 0) {
              showScanResult(barcodes[0].rawValue, 'scanner-upload-result');
            } else {
              showScanResult('No QR code found in image', 'scanner-upload-result');
            }
          }).catch(function() {
            showScanResult('Failed to scan image', 'scanner-upload-result');
          });
        } else {
          showScanResult('BarcodeDetector not available in this browser. Try Chrome.', 'scanner-upload-result');
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function showScanResult(text, containerId) {
    var el = document.getElementById(containerId);
    el.style.display = 'block';
    var isURL = /^https?:\/\//i.test(text);
    el.innerHTML = '<strong>Decoded:</strong> ' + (isURL ? '<a href="' + text + '" target="_blank" rel="noopener" style="color:var(--accent)">' + text + '</a>' : text);
  }

  // ============================================
  // INIT
  // ============================================
  document.addEventListener('DOMContentLoaded', function() {
    initTheme();
    if (!tryRestore()) {
      initQR();
    }
    bindControls();
    updateUndoButtons();
  });

})();
</script>
